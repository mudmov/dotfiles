set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"
set -ga terminal-overrides ",*256color*:Tc:smcup@:rmcup@"
setenv -g LANG "en_US.UTF-8"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on 
set -g history-limit 50000
set -g mouse on
set -s escape-time 0
# Place status bar at the top
set -g status-position top


### Utils ###
# Allow clipboard with OSC-52 work, see https://github.com/tmux/tmux/wiki/Clipboard
set -s set-clipboard on
set -g allow-passthrough on

# VIM style selection in copy mode
unbind -T copy-mode-vi MouseDragEnd1Pane
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"

# Clear selection on single click
bind -T copy-mode-vi MouseDown1Pane send-keys -X clear-selection \; select-pane

# Pane Navigation (vim-tmux-navigator style)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l"

# Prefix-based pane navigation (backup)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind q last-window

# Move windows (using different keys to avoid conflict)
bind -r H select-window -t :-
bind -r L select-window -t :+

# Set prefix
set -g prefix C-q
bind C-q send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Instakill panes and windows
bind & kill-window
bind x kill-pane

# Faster Session Creation
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"

# Open panes in same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"


### Plugins ###
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g @catppuccin_window_current_text " #{b:pane_current_path}"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Plugins
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Check tpm exists before installing
if '[ -f ~/.tmux/plugins/tpm/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm' 'display-message "TPM not found, skipping plugin load"'
